<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/normalize.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/theme-glass.css" />
  <title>Список задач</title>
</head>
<body class="app-body">
  <div id="auth-overlay" class="auth-overlay" role="dialog" aria-modal="true" aria-label="Вход и регистрация"></div>
  <main class="main app-shell app-shell--hidden">
    <section class="main__control control container">
      <h1 class="control__title">Список задач</h1>
      <div class="control__trailing">
        <button
          type="button"
          class="control__button control__button--logout visually-hidden"
          id="app-logout"
          aria-label="Выйти из аккаунта"
        >
          Выйти
        </button>
      </div>
    </section>
  </main>
  <script src="./bundle.js"></script>
</body>
</html>
